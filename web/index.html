<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生活服务新人闯关训练</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Life Service Onboarding Quest</div>
        <h1>生活服务新人闯关训练</h1>
      </div>
      <div class="top-actions">
        <button class="icon-button" id="importDemoBtn" title="导入关卡一试跑样例" aria-label="导入关卡一试跑样例">＋</button>
        <button class="icon-button" id="copyReportBtn" title="复制报告草稿" aria-label="复制报告草稿">⧉</button>
        <button class="icon-button" id="exportJsonBtn" title="导出 JSON" aria-label="导出 JSON">⇩</button>
        <button class="icon-button danger" id="resetBtn" title="清空本地数据" aria-label="清空本地数据">⌫</button>
      </div>
    </header>

    <section class="status-band">
      <div>
        <span class="status-label">主题</span>
        <strong>抖音生活服务评价生产与看评消费体验</strong>
      </div>
      <div>
        <span class="status-label">完成</span>
        <strong id="progressText">0/6</strong>
      </div>
      <div>
        <span class="status-label">当前徽章</span>
        <strong id="badgeText">消费决策侦探</strong>
      </div>
      <div class="progress-track" aria-label="完成进度">
        <div id="progressBar"></div>
      </div>
    </section>

    <main class="workspace">
      <nav class="level-map" aria-label="关卡地图">
        <div class="panel-heading">
          <h2>闯关地图</h2>
          <span>标准版</span>
        </div>
        <div id="levelList" class="level-list"></div>
      </nav>

      <section class="task-panel">
        <div class="task-header">
          <div>
            <span id="levelMeta" class="pill">L1 · 消费者 · 30 分钟</span>
            <h2 id="levelTitle">找店迷宫</h2>
          </div>
          <button id="saveBtn" class="primary-button">保存进度</button>
        </div>

        <div class="task-card">
          <h3>任务目标</h3>
          <p id="levelGoal"></p>
          <h3>主线任务</h3>
          <p id="levelMainTask"></p>
        </div>

        <div class="task-card">
          <div class="section-title">
            <h3>体验记录</h3>
            <span id="autosaveText">未保存</span>
          </div>
          <form id="submissionForm" class="submission-form"></form>
        </div>

        <div class="task-card">
          <h3>通过标准</h3>
          <ul id="criteriaList" class="criteria-list"></ul>
        </div>
      </section>

      <aside class="coach-panel">
        <div class="panel-heading">
          <h2>教练面板</h2>
          <span id="scoreText">0 分</span>
        </div>
        <div class="score-box">
          <div class="score-ring" id="scoreRing">0</div>
          <div>
            <strong id="scoreLabel">等待提交</strong>
            <p id="scoreHint">填写体验记录后生成阶段汇报卡。</p>
          </div>
        </div>
        <div class="coach-actions">
          <button id="generateCardBtn" class="secondary-button">生成阶段汇报卡</button>
          <button id="copyCardBtn" class="ghost-button">复制汇报卡</button>
        </div>
        <div class="report-card" id="reportCard">
          <p class="muted">阶段汇报卡会显示在这里。</p>
        </div>

        <div class="report-panel">
          <div class="panel-heading compact">
            <h2>报告草稿</h2>
            <button id="generateReportBtn" class="text-button">生成</button>
          </div>
          <textarea id="reportOutput" readonly placeholder="完成关卡后生成 Markdown 报告草稿"></textarea>
        </div>
      </aside>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
